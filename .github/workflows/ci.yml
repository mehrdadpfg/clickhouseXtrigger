name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref — a new push makes the old one moot.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # tsc --noEmit type-checks the whole project without executing any module,
      # so it needs no secrets. A full `next build` would evaluate route modules,
      # which import lib/env.ts and throw on missing credentials — not something
      # to wire real ClickHouse/Postgres/Anthropic keys into CI for.
      - name: Typecheck
        run: bun run typecheck
